<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #f5f5f5; }
    .container { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #333; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #666; font-size: 14px; }
    a { display: inline-block; margin-top: 16px; padding: 12px 24px; background: #333; color: #fff; text-decoration: none; border-radius: 8px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p id="msg">Redirecting to Loka Cash app...</p>
    <a id="openBtn" style="display:none" href="#">Open Loka Cash</a>
  </div>
  <script>
    var search = window.location.search;
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    var isAndroid = /Android/.test(navigator.userAgent);

    if (isAndroid) {
      // Android: use Intent URL
      var intentUrl = 'intent://www.loka.cash/redirect' + search + '#Intent;scheme=https;package=com.lokacash.app;end';
      window.location.href = intentUrl;

      setTimeout(function() {
        document.getElementById('msg').textContent = 'If the app did not open automatically, tap the button below:';
        var btn = document.getElementById('openBtn');
        btn.style.display = 'inline-block';
        btn.href = intentUrl;
      }, 2000);
    } else if (isIOS) {
      // iOS: use Universal Link (https scheme directly)
      var universalLink = 'https://www.loka.cash/redirect' + search;
      // Also try custom URL scheme as fallback
      var customScheme = 'lokacash://redirect' + search;
      
      // Try custom URL scheme first (works for installed apps)
      window.location.href = customScheme;
      
      setTimeout(function() {
        document.getElementById('msg').textContent = 'If the app did not open automatically, tap the button below:';
        var btn = document.getElementById('openBtn');
        btn.style.display = 'inline-block';
        btn.href = customScheme;
      }, 2000);
    } else {
      // Desktop or other: just show the params
      document.getElementById('msg').textContent = 'OAuth callback received. Close this window and return to the app.';
    }
  </script>
</body>
</html>
