<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #f5f5f5; }
    .container { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #333; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Redirecting to Loka Cash app...</p>
  </div>
  <script>
    // If the deep link doesn't work (app not installed), show a message after 3 seconds
    setTimeout(function() {
      document.querySelector('p').textContent = 'If the app did not open, please install Loka Cash from the app store.';
    }, 3000);
  </script>
</body>
</html>
