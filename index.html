<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Loka Cash | AIUSD Treasury Stablecoin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Outfit:wght@400;600;800;900&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #FFFFFF;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    .font-serif {
      font-family: 'Instrument Serif', serif;
    }

    .font-outfit {
      font-family: 'Outfit', sans-serif;
    }

    .font-space {
      font-family: 'Space Grotesk', sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
    }

    .btn-primary {
      background-color: #000000;
      color: #ffffff;
      border-radius: 9999px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      background-color: #1a1a1a;
      transform: translateY(-1px);
    }

    /* Smooth page transitions */
    .animate-fadeIn {
      animation: fadeIn 0.5s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% center;
      }

      100% {
        background-position: -200% center;
      }
    }

    @keyframes blobDance {
      0% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(30px, -50px) scale(1.1);
      }

      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }

      100% {
        transform: translate(0, 0) scale(1);
      }
    }

    @keyframes gridMove {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 40px 40px;
      }
    }

    @keyframes hoverFloat {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-20px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    @keyframes float1 {

      0%,
      100% {
        transform: translate(0, 0);
      }

      33% {
        transform: translate(15px, -30px);
      }

      66% {
        transform: translate(-10px, 15px);
      }
    }

    @keyframes float2 {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(-20px, -25px);
      }
    }

    @keyframes borderBeam {
      0% {
        offset-distance: 0%;
      }

      100% {
        offset-distance: 100%;
      }
    }

    @keyframes inputPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
      }

      50% {
        box-shadow: 0 0 20px 2px rgba(74, 222, 128, 0.15);
      }
    }

    .premium-input-ring:focus-within {
      animation: inputPulse 2s infinite ease-in-out;
      border-color: rgba(74, 222, 128, 0.5);
      transform: scale(1.005);
      background: #ffffff;
    }

    @keyframes cursorBlink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    @keyframes idleGlow {

      0%,
      100% {
        box-shadow: 0 8px 40px -12px rgba(0, 0, 0, 0.06);
        border-color: rgba(229, 231, 235, 0.8);
      }

      50% {
        box-shadow: 0 8px 40px -8px rgba(74, 222, 128, 0.08), 0 0 0 1px rgba(74, 222, 128, 0.08);
        border-color: rgba(74, 222, 128, 0.25);
      }
    }

    .idle-input-glow {
      animation: idleGlow 3s ease-in-out infinite;
    }

    /* Light mode scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #999;
    }

    /* Mobile safe area for bottom nav */
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* Hide scrollbar on mobile */
    @media (max-width: 767px) {
      ::-webkit-scrollbar {
        display: none;
      }
      body {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",

    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
